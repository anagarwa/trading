# Cloudflare Worker config for the Trading Agent Scheduler
# Deploy with: wrangler deploy --config wrangler_scheduler.toml
#
# After deploying, set secrets once:
#   wrangler secret put FINE_GRAINED_PAT --name trading-scheduler
#   wrangler secret put GITHUB_OWNER     --name trading-scheduler
#   wrangler secret put GITHUB_REPO      --name trading-scheduler
#
# Manual test (HTTP trigger):
#   curl "https://trading-scheduler.<your-subdomain>.workers.dev/?confirm=yes"
#
# Live log stream:
#   wrangler tail --name trading-scheduler

name = "trading-scheduler"
main = "trading_scheduler.js"
compatibility_date = "2024-01-01"

[triggers]
crons = [
  "50 3 * * 1-5",   #  9:20 AM IST (03:50 UTC) Mon–Fri
  "50 5 * * 1-5",   # 11:20 AM IST (05:50 UTC) Mon–Fri
  "50 7 * * 1-5",   #  1:20 PM IST (07:50 UTC) Mon–Fri
  "50 9 * * 1-5",   #  3:20 PM IST (09:50 UTC) Mon–Fri — sell-only
]
