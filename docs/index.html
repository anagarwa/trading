<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot — Kite Token Exchange</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 10px; color: #f0f6fc; }
    p  { font-size: 15px; line-height: 1.6; color: #8b949e; margin-bottom: 8px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f85149; }
    code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 13px;
      color: #79c0ff;
      word-break: break-all;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="icon">⏳</div>
  <h1>Redirecting to token exchange…</h1>
  <p>Forwarding your Kite token to the Cloudflare Worker.</p>
  <div class="spinner"></div>
</div>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // CONFIGURATION — set your Cloudflare Worker URL here (not a secret)
  // ─────────────────────────────────────────────────────────────────────────

  // Replace with your deployed Cloudflare Worker URL.
  // Example: "https://kite-token-exchange.YOUR-SUBDOMAIN.workers.dev"
  // No trailing slash.
  const WORKER_URL = "https://kite-token-exchange.YOUR-SUBDOMAIN.workers.dev";  // ← replace

  // ─────────────────────────────────────────────────────────────────────────
  // Logic — do not edit below this line
  // ─────────────────────────────────────────────────────────────────────────

  const params       = new URLSearchParams(window.location.search);
  const requestToken = params.get("request_token");

  console.log("[index.html] Page loaded. request_token present:", !!requestToken);

  function showError(msg) {
    document.getElementById("card").innerHTML = `
      <div class="icon">🚨</div>
      <h1 class="error">Token exchange failed</h1>
      <p style="margin-top:8px">${msg}</p>
      <p style="margin-top:16px;font-size:13px">
        Check that <code>WORKER_URL</code> is correctly set in <code>docs/index.html</code>
        and that your Cloudflare Worker is deployed.
      </p>
    `;
  }

  if (!requestToken) {
    console.error("[index.html] No request_token in URL — Kite login may have failed.");
    showError("No <code>request_token</code> found in the URL. The Kite login may have failed.");
  } else {
    // Forward all query params (including request_token) to the Cloudflare Worker.
    // The Worker holds all secrets server-side — nothing sensitive is in this file.
    const workerTarget = WORKER_URL + window.location.search;
    console.log("[index.html] Redirecting to Cloudflare Worker:", workerTarget.replace(requestToken, "[REDACTED]"));
    window.location.replace(workerTarget);
  }
</script>
</body>
</html>
